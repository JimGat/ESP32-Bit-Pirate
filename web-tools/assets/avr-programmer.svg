<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300" role="img" aria-labelledby="title desc">
  <title id="title">Web AVR Programmer desktop-style browser interface</title>
  <desc id="desc">A compact preview of the AVRDUDE WebAssembly programmer with target controls, device information and operation progress.</desc>
  <rect width="520" height="300" rx="8" fill="#0b0d0c"/>
  <rect x="16" y="16" width="488" height="268" rx="8" fill="#121615" stroke="#333"/>
  <rect x="16" y="16" width="488" height="42" rx="8" fill="#101412" stroke="#333"/>
  <rect x="30" y="27" width="22" height="22" rx="5" fill="#1a1a1a" stroke="#2f3a2f"/>
  <text x="37" y="43" fill="#00ff00" font-family="Menlo, Courier New, monospace" font-size="13" font-weight="900">B</text>
  <text x="64" y="41" fill="#e0e0e0" font-family="Menlo, Courier New, monospace" font-size="17" font-weight="700">Web AVR Programmer</text>
  <rect x="320" y="26" width="79" height="22" rx="5" fill="#0d0d0d" stroke="#2b2b2b"/>
  <text x="331" y="41" fill="#00ffcc" font-family="Menlo, Courier New, monospace" font-size="9">AVRDUDE</text>
  <rect x="410" y="26" width="76" height="22" rx="5" fill="#26332a" stroke="#2b2b2b"/>
  <text x="427" y="41" fill="#b8ffb8" font-family="Menlo, Courier New, monospace" font-size="10" font-weight="700">Connect</text>

  <rect x="28" y="72" width="464" height="30" rx="6" fill="#0f0f0f" stroke="#333"/>
  <g font-family="Menlo, Courier New, monospace" font-size="9">
    <text x="42" y="91" fill="#9aa0a6">Programmer</text><text x="101" y="91" fill="#d8fff2">Bus Pirate</text>
    <text x="183" y="91" fill="#9aa0a6">Target</text><text x="225" y="91" fill="#d8fff2">ATmega328P</text>
    <text x="335" y="91" fill="#9aa0a6">Status</text><text x="376" y="91" fill="#b8ffb8">Ready</text>
  </g>

  <rect x="28" y="112" width="286" height="112" rx="7" fill="#0f0f0f" stroke="#333"/>
  <text x="42" y="134" fill="#00ff00" font-family="Menlo, Courier New, monospace" font-size="11" font-weight="700">PROGRAMMING</text>
  <text x="42" y="157" fill="#9aa0a6" font-family="Menlo, Courier New, monospace" font-size="10">Flash file</text>
  <rect x="104" y="145" width="196" height="18" rx="4" fill="#080a09" stroke="#2b2b2b"/>
  <text x="114" y="158" fill="#d8fff2" font-family="Menlo, Courier New, monospace" font-size="9">firmware.hex</text>
  <rect x="42" y="178" width="74" height="24" rx="5" fill="#26332a" stroke="#2b2b2b"/>
  <text x="57" y="194" fill="#b8ffb8" font-family="Menlo, Courier New, monospace" font-size="9" font-weight="700">Detect</text>
  <rect x="124" y="178" width="74" height="24" rx="5" fill="#17252b" stroke="#2b2b2b"/>
  <text x="139" y="194" fill="#d8fff2" font-family="Menlo, Courier New, monospace" font-size="9">Read</text>
  <rect x="206" y="178" width="84" height="24" rx="5" fill="#26332a" stroke="#2b2b2b"/>
  <text x="221" y="194" fill="#b8ffb8" font-family="Menlo, Courier New, monospace" font-size="9" font-weight="700">Write</text>
  <text x="42" y="217" fill="#9aa0a6" font-family="Menlo, Courier New, monospace" font-size="9">Flash · EEPROM · Fuses · Verify</text>

  <rect x="326" y="112" width="166" height="112" rx="7" fill="#0f0f0f" stroke="#333"/>
  <text x="340" y="134" fill="#00ff00" font-family="Menlo, Courier New, monospace" font-size="11" font-weight="700">TARGET INFO</text>
  <g font-family="Menlo, Courier New, monospace" font-size="10">
    <text x="340" y="157" fill="#9aa0a6">Signature</text><text x="409" y="157" fill="#d8fff2">1E950F</text>
    <text x="340" y="177" fill="#9aa0a6">Flash</text><text x="409" y="177" fill="#e0e0e0">32 KB</text>
    <text x="340" y="197" fill="#9aa0a6">EEPROM</text><text x="409" y="197" fill="#e0e0e0">1 KB</text>
    <text x="340" y="217" fill="#9aa0a6">ISP</text><text x="409" y="217" fill="#b8ffb8">Active</text>
  </g>

  <rect x="28" y="238" width="464" height="30" rx="6" fill="#101412" stroke="#333"/>
  <text x="42" y="257" fill="#d8ddd8" font-family="Menlo, Courier New, monospace" font-size="10">Writing flash...</text>
  <rect x="170" y="247" width="286" height="12" rx="4" fill="#080a09" stroke="#2b2b2b"/>
  <rect x="171" y="248" width="204" height="10" rx="3" fill="#0ea86b"/>
  <text x="464" y="257" fill="#9aa0a6" font-family="Menlo, Courier New, monospace" font-size="9">71%</text>
</svg>