    <text x="552" y="535" fill="#ff9d4d">GPIO</text>
    <text x="641" y="535" fill="#6eb4ff">JTAG / SWD</text>
    <text x="788" y="535" fill="#9fb0a8">ESP32</text>
    <text x="872" y="535" fill="#9fb0a8">AVR</text>
    <text x="934" y="535" fill="#9fb0a8">STM32</text>
