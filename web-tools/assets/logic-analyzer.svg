  <rect x="345" y="246" width="38" height="14" rx="4" fill="#17252b" stroke="#2b2b2b"/>
  <text x="355" y="257" fill="#d8fff2" font-family="Menlo, Courier New, monospace" font-size="9">VCD</text>
  <rect x="389" y="246" width="38" height="14" rx="4" fill="#17252b" stroke="#2b2b2b"/>
  <text x="399" y="257" fill="#d8fff2" font-family="Menlo, Courier New, monospace" font-size="9">CSV</text>
  <rect x="433" y="246" width="45" height="14" rx="4" fill="#26332a" stroke="#2b2b2b"/>
  <text x="442" y="257" fill="#b8ffb8" font-family="Menlo, Courier New, monospace" font-size="9">JSON</text>
