<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300" role="img" aria-labelledby="title desc">
  <title id="title">Web SPI Flash Programmer desktop-style browser interface</title>
  <desc id="desc">A compact preview of the SPI flash programmer with chip details, read controls and memory progress.</desc>
  <rect width="520" height="300" rx="8" fill="#0b0d0c"/>
  <rect x="16" y="16" width="488" height="268" rx="8" fill="#121615" stroke="#333"/>
  <rect x="16" y="16" width="488" height="42" rx="8" fill="#101412" stroke="#333"/>
  <rect x="30" y="27" width="22" height="22" rx="5" fill="#1a1a1a" stroke="#2f3a2f"/>
  <text x="37" y="43" fill="#00ff00" font-family="Menlo, Courier New, monospace" font-size="13" font-weight="900">B</text>
  <text x="64" y="41" fill="#e0e0e0" font-family="Menlo, Courier New, monospace" font-size="16" font-weight="700">Web SPI Flash Programmer</text>
  <rect x="329" y="26" width="70" height="22" rx="5" fill="#0d0d0d" stroke="#2b2b2b"/>
  <text x="341" y="41" fill="#00ffcc" font-family="Menlo, Courier New, monospace" font-size="9">serprog</text>
  <rect x="410" y="26" width="76" height="22" rx="5" fill="#26332a" stroke="#2b2b2b"/>
  <text x="427" y="41" fill="#b8ffb8" font-family="Menlo, Courier New, monospace" font-size="10" font-weight="700">Connect</text>

  <g transform="translate(28 72)">
    <rect width="206" height="28" rx="6" fill="#17252b" stroke="#00ffcc" stroke-opacity=".55"/>
    <text x="22" y="19" fill="#00ffcc" font-family="Menlo, Courier New, monospace" font-size="12" font-weight="700">Read</text>
    <text x="80" y="19" fill="#d8ddd8" font-family="Menlo, Courier New, monospace" font-size="12">Dump</text>
    <text x="142" y="19" fill="#d8ddd8" font-family="Menlo, Courier New, monospace" font-size="12">Write</text>
  </g>

  <rect x="28" y="112" width="188" height="112" rx="7" fill="#0f0f0f" stroke="#333"/>
  <text x="42" y="134" fill="#00ff00" font-family="Menlo, Courier New, monospace" font-size="11" font-weight="700">DETECTED CHIP</text>
  <g font-family="Menlo, Courier New, monospace" font-size="10">
    <text x="42" y="157" fill="#9aa0a6">Model</text><text x="98" y="157" fill="#e0e0e0">W25Q128JV</text>
    <text x="42" y="177" fill="#9aa0a6">JEDEC</text><text x="98" y="177" fill="#d8fff2">EF 40 18</text>
    <text x="42" y="197" fill="#9aa0a6">Size</text><text x="98" y="197" fill="#e0e0e0">16 MB</text>
    <text x="42" y="217" fill="#9aa0a6">Status</text><text x="98" y="217" fill="#b8ffb8">Ready</text>
  </g>

  <rect x="228" y="112" width="264" height="112" rx="7" fill="#0f0f0f" stroke="#333"/>
  <text x="242" y="134" fill="#00ff00" font-family="Menlo, Courier New, monospace" font-size="11" font-weight="700">READ RANGE</text>
  <g font-family="Menlo, Courier New, monospace" font-size="10">
    <text x="242" y="157" fill="#9aa0a6">Start</text>
    <rect x="294" y="145" width="86" height="18" rx="4" fill="#080a09" stroke="#2b2b2b"/>
    <text x="303" y="158" fill="#d8fff2">0x000000</text>
    <text x="390" y="157" fill="#9aa0a6">Length</text>
    <rect x="438" y="145" width="40" height="18" rx="4" fill="#080a09" stroke="#2b2b2b"/>
    <text x="445" y="158" fill="#d8fff2">4 KB</text>
  </g>
  <rect x="242" y="178" width="108" height="24" rx="5" fill="#26332a" stroke="#2b2b2b"/>
  <text x="260" y="194" fill="#b8ffb8" font-family="Menlo, Courier New, monospace" font-size="10" font-weight="700">Read Range</text>
  <rect x="360" y="178" width="108" height="24" rx="5" fill="#17252b" stroke="#2b2b2b"/>
  <text x="382" y="194" fill="#d8fff2" font-family="Menlo, Courier New, monospace" font-size="10">Save BIN</text>
  <text x="242" y="216" fill="#9aa0a6" font-family="Menlo, Courier New, monospace" font-size="9">Probe, read, dump, write and verify</text>

  <rect x="28" y="238" width="464" height="30" rx="6" fill="#101412" stroke="#333"/>
  <text x="42" y="257" fill="#d8ddd8" font-family="Menlo, Courier New, monospace" font-size="10">Idle · Chip ready</text>
  <rect x="170" y="247" width="286" height="12" rx="4" fill="#080a09" stroke="#2b2b2b"/>
  <rect x="171" y="248" width="118" height="10" rx="3" fill="#0ea86b"/>
  <text x="464" y="257" fill="#9aa0a6" font-family="Menlo, Courier New, monospace" font-size="9">41%</text>
</svg>