<body>
  <main class="app-shell">
    <noscript>
      <section class="compatibility-banner">
        <h2>JavaScript is required</h2>
        <p>This browser serial terminal needs JavaScript and Web Serial support. You can still visit the <a href="../">ESP32 Bit Pirate web tools</a>, the <a href="https://github.com/geo-tp/ESP32-Bit-Pirate">ESP32 Bit Pirate repository</a>, or the <a href="https://github.com/geo-tp/ESP32-Bit-Pirate/wiki">documentation</a>.</p>
      </section>
    </noscript>

    <section id="compatibilityBanner" class="compatibility-banner" hidden>
      <h2>Web Serial is not available in this browser</h2>
      <p>Use Chrome 89+, Edge 89+, Firefox 151+ on desktop, Opera, or another compatible Chromium browser over HTTPS or localhost. Safari is not currently supported.</p>
    </section>

    <section class="tool-card" aria-label="Web Serial terminal tool">
      <div class="toolbar" aria-label="Serial connection controls">
        <div class="toolbar-brand" aria-label="Web Serial Terminal">
          <a class="brand-mark" href="../" aria-label="Open ESP32 Bit Pirate web tools">B</a>
          <a class="tool-home-link" href="../">Web Serial Terminal</a>

          <div class="terminal-controls" aria-label="Terminal appearance">
            <button id="fontDecreaseButton" type="button" aria-label="Decrease terminal text size">-</button>
            <select id="themeSelect" aria-label="Terminal color theme">
              <option value="soft" selected>Soft</option>
              <option value="green">Green</option>
              <option value="contrast">Contrast</option>
            </select>
            <button id="fontIncreaseButton" type="button" aria-label="Increase terminal text size">+</button>
          </div>

          <span class="config-status-group">
            <button id="configButton" class="config-button" type="button" aria-label="Serial settings" aria-expanded="false" aria-controls="configPanel" title="Serial settings">⚙</button>
            <span id="connectionStatus" class="connection-status" aria-live="polite">Ready</span>
          </span>
        </div>

        <div class="toolbar-actions">
          <button id="connectButton" type="button" class="primary">Connect</button>
          <button id="clearButton" type="button">Clear</button>
          <button id="downloadButton" type="button" disabled title="No serial log to download">Download log</button>
        </div>
      </div>

      <section class="terminal-panel" aria-label="Serial terminal">
        <div id="terminal" class="terminal-surface"></div>
      </section>
    </section>
  </main>

  <div id="configOverlay" class="modal-overlay" hidden></div>
  <section id="configPanel" class="config-panel" role="dialog" aria-modal="true" aria-labelledby="configTitle" hidden>
    <header class="config-header">
      <h2 id="configTitle">Serial Settings</h2>
      <button id="configCloseButton" type="button" aria-label="Close serial settings">×</button>
    </header>

    <div class="config-grid">
      <label>
        <span>Baud</span>
        <input id="baudRateInput" type="number" min="1" step="1" inputmode="numeric" value="115200">
      </label>

      <label>
        <span>Data bits</span>
        <select id="dataBitsSelect">
          <option value="8" selected>8</option>
          <option value="7">7</option>
        </select>
      </label>

      <label>
        <span>Stop bits</span>
        <select id="stopBitsSelect">
          <option value="1" selected>1</option>
          <option value="2">2</option>
        </select>
      </label>

      <label>
        <span>Parity</span>
        <select id="paritySelect">
          <option value="none" selected>None</option>
          <option value="even">Even</option>
          <option value="odd">Odd</option>
        </select>
      </label>

      <label>
        <span>Flow control</span>
        <select id="flowControlSelect">
          <option value="none" selected>None</option>
          <option value="hardware">Hardware</option>
        </select>
      </label>

      <label>
        <span>Enter key</span>
        <select id="enterModeSelect">
          <option value="cr" selected>CR</option>
          <option value="lf">LF</option>
          <option value="crlf">CRLF</option>
        </select>
      </label>
    </div>

    <label class="config-check">
      <input id="localEchoCheckbox" type="checkbox">
      <span>Local echo</span>
    </label>

    <label class="config-check disabled">
      <input id="invertSignalCheckbox" type="checkbox" disabled>
      <span>Inverted UART is not supported by browser Web Serial.</span>
    </label>
  </section>

  <script src="vendor/xterm/xterm.min.js"></script>
  <script src="vendor/xterm/addon-fit.min.js"></script>
  <script type="module" src="scripts/app.js"></script>
</body>
